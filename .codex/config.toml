[features]
multi_agent = true

[agents.explorer]
description = "只讀探索：找入口/資料流/關聯檔案，不修改檔案。"
config_file = "../agents/explorer.toml"

[agents.architect]
description = "任務拆分/驗收條件/介面定義，只讀。"
config_file = "../agents/architect.toml"

[agents.backend_worker]
description = "後端實作：backend/ Django/Celery/排程/DBTool。"
config_file = "../agents/backend-worker.toml"

[agents.data_worker]
description = "資料/ETL：抓取/清洗/入庫（Mongo/Postgres）、一致性。"
config_file = "../agents/data-worker.toml"

[agents.streamlit_worker]
description = "Streamlit 實作：streamlit_app/ UI/查詢/快取。"
config_file = "../agents/streamlit-worker.toml"

[agents.reviewer]
description = "只讀審查：correctness/security/test/回歸風險。"
config_file = "../agents/reviewer.toml"
